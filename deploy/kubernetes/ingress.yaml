apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: claude-memory
  namespace: claude-memory
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - claude-memory.example.com
      secretName: tls-secret
  rules:
    - host: claude-memory.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: claude-memory
                port:
                  number: 80
